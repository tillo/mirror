stages:
  - build
  - scan
  - notify

buildkit:
  image:
    name: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/moby/buildkit:rootless
    entrypoint: [""]
  stage: build
  tags:
    - mdapi
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    CACHE_IMAGE: $CI_REGISTRY_IMAGE:cache
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{
        \"auths\": {
          \"${CI_REGISTRY}\": {
            \"auth\": \"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"
          },
          \"$(echo -n $CI_DEPENDENCY_PROXY_SERVER | awk -F[:] '{print $1}')\": {
            \"auth\": \"$(printf "%s:%s" ${CI_DEPENDENCY_PROXY_USER} "${CI_DEPENDENCY_PROXY_PASSWORD}" | base64 | tr -d '\n')\"
          }
        }
      }" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --export-cache type=registry,ref=$CACHE_IMAGE \
        --import-cache type=registry,ref=$CACHE_IMAGE \
        --opt platform=linux/amd64 \
        --opt build-arg:CACHEBUST_DAY=$(date +%Y%m%d) \
        --progress=plain \
        --output type=image,\"name=$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA,$CI_REGISTRY_IMAGE:latest\",push=true \
        > build.log 2>&1
      EXIT_CODE=$?
      cat build.log
      exit $EXIT_CODE
  artifacts:
    when: always
    paths:
      - build.log
    expire_in: 1 hour

# Generates an SBOM with Syft and scans it with Grype.
# Non-blocking: exits 0 regardless of findings so the pipeline continues.
# Sends a Pushover notification only when HIGH or CRITICAL CVEs are found.
# SBOM and vulnerability report are kept as artifacts for 7 days.
scan:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:latest
  stage: scan
  tags:
    - mdapi
  rules:
    - when: on_success
  before_script:
    - apk add --no-cache curl python3
    - |
      # Install Syft
      curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
        | sh -s -- -b /usr/local/bin
    - |
      # Install Grype
      curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
        | sh -s -- -b /usr/local/bin
    - |
      # Authenticate to registry so Syft/Grype can pull the image
      mkdir -p ~/.docker
      echo "{
        \"auths\": {
          \"${CI_REGISTRY}\": {
            \"auth\": \"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"
          }
        }
      }" > ~/.docker/config.json
  script:
    - IMAGE="${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}"
    - echo "Generating SBOM for ${IMAGE}"
    - syft "${IMAGE}" -o spdx-json=sbom.spdx.json
    - echo "Scanning with Grype"
    - grype sbom:sbom.spdx.json --output json > grype-report.json 2>/dev/null || true
    - grype sbom:sbom.spdx.json --output table 2>/dev/null || true
    - |
      # Notify on HIGH or CRITICAL findings only
      FINDINGS=$(python3 - <<'PYEOF'
      import json, sys
      try:
          data = json.load(open('grype-report.json'))
      except Exception:
          sys.exit(0)
      hits = [
          f"{m['vulnerability']['id']} {m['vulnerability']['severity']} — {m['artifact']['name']}:{m['artifact']['version']}"
          for m in data.get('matches', [])
          if m['vulnerability'].get('severity', '').upper() in ('HIGH', 'CRITICAL')
      ]
      if hits:
          print('\n'.join(hits[:20]))
      PYEOF
      )
      if [ -n "$FINDINGS" ]; then
        COUNT=$(echo "$FINDINGS" | wc -l)
        curl -sf \
          --form-string "token=$PUSHOVER_API_TOKEN" \
          --form-string "user=$PUSHOVER_USER_KEY" \
          --form-string "title=Mirror: ${COUNT} HIGH/CRITICAL CVE(s)" \
          --form-string "message=$(printf '%s\n\n%s' "$IMAGE" "$FINDINGS")" \
          --form-string "priority=1" \
          https://api.pushover.net/1/messages.json
      else
        echo "No HIGH or CRITICAL CVEs found."
      fi
  artifacts:
    when: always
    paths:
      - sbom.spdx.json
      - grype-report.json
    expire_in: 7 days
  allow_failure: true

notify-success:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:latest
  stage: notify
  tags:
    - mdapi
  variables:
    GIT_DEPTH: "5"
  rules:
    - when: on_success
  before_script:
    - apk add --no-cache git curl python3
  script:
    - |
      REASON=$(python3 - <<'PYEOF'
      import re
      try:
          content = open('build.log').read()
      except FileNotFoundError:
          exit()
      steps = {}
      for m in re.finditer(r'^#(\d+) \[(\d+/\d+)\] (.+)$', content, re.MULTILINE):
          steps[m.group(1)] = m.group(3).strip()
      cached = set(re.findall(r'^#(\d+) CACHED', content, re.MULTILINE))
      changed = [label for num, label in sorted(steps.items(), key=lambda x: int(x[0])) if num not in cached]
      if changed:
          print('\n'.join(changed))
      PYEOF
      )
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ] && [ -z "$REASON" ]; then
        echo "All layers cached on scheduled run — nothing changed, skipping notification"
        exit 0
      fi
      MSG=$(printf '%s:%s' "$CI_REGISTRY_IMAGE" "$CI_COMMIT_SHORT_SHA")
      if [ "$CI_PIPELINE_SOURCE" != "schedule" ]; then
        if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
          CHANGES=$(git log --oneline -5 2>/dev/null || true)
        else
          CHANGES=$(git log --oneline "${CI_COMMIT_BEFORE_SHA}..${CI_COMMIT_SHA}" 2>/dev/null || true)
        fi
        [ -n "$CHANGES" ] && MSG=$(printf '%s\n\nGit changes:\n%s' "$MSG" "$CHANGES")
      fi
      [ -n "$REASON" ] && MSG=$(printf '%s\n\nRebuilt layers:\n%s' "$MSG" "$REASON")
      curl -sf \
        --form-string "token=$PUSHOVER_API_TOKEN" \
        --form-string "user=$PUSHOVER_USER_KEY" \
        --form-string "title=Mirror: new image pushed" \
        --form-string "message=$MSG" \
        https://api.pushover.net/1/messages.json

notify-failure:
  image: ${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}/alpine:latest
  stage: notify
  tags:
    - mdapi
  rules:
    - when: on_failure
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf \
        --form-string "token=$PUSHOVER_API_TOKEN" \
        --form-string "user=$PUSHOVER_USER_KEY" \
        --form-string "title=Mirror: build failed" \
        --form-string "message=$(printf 'buildkit job failed.\n%s' "$CI_PIPELINE_URL")" \
        --form-string "priority=1" \
        https://api.pushover.net/1/messages.json
